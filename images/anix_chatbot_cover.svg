<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg" width="800" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg_center" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0d1a0a"/>
      <stop offset="100%" style="stop-color:#080a08"/>
    </radialGradient>
    <radialGradient id="lime_core" cx="50%" cy="48%" r="45%">
      <stop offset="0%" style="stop-color:#c8f247;stop-opacity:0.13"/>
      <stop offset="100%" style="stop-color:#c8f247;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="teal_top" cx="75%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#4fffb0;stop-opacity:0.09"/>
      <stop offset="100%" style="stop-color:#4fffb0;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow_sm">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow_md">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow_lg">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur_bg">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="800" height="900" fill="url(#bg_center)"/>
  <rect width="800" height="900" fill="url(#lime_core)"/>
  <rect width="800" height="900" fill="url(#teal_top)"/>

  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.032)" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/><line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="700" x2="800" y2="700"/><line x1="0" y1="800" x2="800" y2="800"/>
    <line x1="100" y1="0" x2="100" y2="900"/><line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="300" y1="0" x2="300" y2="900"/><line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="500" y1="0" x2="500" y2="900"/><line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="700" y1="0" x2="700" y2="900"/>
  </g>

  <!-- Ambient glow blob -->
  <circle cx="400" cy="430" r="220" fill="#c8f247" opacity="0.04" filter="url(#blur_bg)"/>

  <!-- ===== NEURAL NETWORK ===== -->
  <!-- All connections input→hidden→output -->
  <g stroke="rgba(200,242,71,0.1)" stroke-width="1.2">
    <line x1="160" y1="280" x2="400" y2="220"/><line x1="160" y1="280" x2="400" y2="360"/>
    <line x1="160" y1="280" x2="400" y2="500"/><line x1="160" y1="430" x2="400" y2="220"/>
    <line x1="160" y1="430" x2="400" y2="360"/><line x1="160" y1="430" x2="400" y2="500"/>
    <line x1="160" y1="580" x2="400" y2="220"/><line x1="160" y1="580" x2="400" y2="360"/>
    <line x1="160" y1="580" x2="400" y2="500"/>
  </g>
  <g stroke="rgba(79,255,176,0.1)" stroke-width="1.2">
    <line x1="400" y1="220" x2="640" y2="310"/><line x1="400" y1="220" x2="640" y2="550"/>
    <line x1="400" y1="360" x2="640" y2="310"/><line x1="400" y1="360" x2="640" y2="550"/>
    <line x1="400" y1="500" x2="640" y2="310"/><line x1="400" y1="500" x2="640" y2="550"/>
  </g>

  <!-- Active paths -->
  <line x1="160" y1="430" x2="400" y2="360" stroke="#c8f247" stroke-width="2" opacity="0.7" filter="url(#glow_sm)"/>
  <line x1="400" y1="360" x2="640" y2="310" stroke="#4fffb0" stroke-width="2" opacity="0.7" filter="url(#glow_sm)"/>
  <line x1="160" y1="280" x2="400" y2="220" stroke="#c8f247" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="500" x2="640" y2="550" stroke="#4fffb0" stroke-width="1.5" opacity="0.35"/>

  <!-- Input nodes -->
  <circle cx="160" cy="280" r="26" fill="#c8f247" opacity="0.05" filter="url(#glow_lg)"/>
  <circle cx="160" cy="430" r="40" fill="#c8f247" opacity="0.12" filter="url(#glow_lg)"/>
  <circle cx="160" cy="580" r="26" fill="#c8f247" opacity="0.05" filter="url(#glow_lg)"/>
  <circle cx="160" cy="280" r="12" fill="#0d1a0a" stroke="#c8f247" stroke-width="1.5" opacity="0.55"/>
  <circle cx="160" cy="430" r="16" fill="#c8f247" opacity="1" filter="url(#glow_md)"/>
  <circle cx="160" cy="430" r="6" fill="white" opacity="0.9"/>
  <circle cx="160" cy="430" r="28" fill="none" stroke="#c8f247" stroke-width="1" opacity="0.2" stroke-dasharray="4 6"/>
  <circle cx="160" cy="580" r="12" fill="#0d1a0a" stroke="#c8f247" stroke-width="1.5" opacity="0.55"/>

  <!-- Hidden nodes -->
  <circle cx="400" cy="220" r="13" fill="#0d1a0a" stroke="rgba(200,242,71,0.4)" stroke-width="1.5"/>
  <circle cx="400" cy="360" r="18" fill="#c8f247" opacity="0.95" filter="url(#glow_md)"/>
  <circle cx="400" cy="360" r="7" fill="white" opacity="0.9"/>
  <circle cx="400" cy="360" r="32" fill="none" stroke="#c8f247" stroke-width="1" opacity="0.18" stroke-dasharray="3 7"/>
  <circle cx="400" cy="500" r="15" fill="#4fffb0" opacity="0.75" filter="url(#glow_sm)"/>
  <circle cx="400" cy="500" r="6" fill="white" opacity="0.7"/>

  <!-- Output nodes -->
  <circle cx="640" cy="310" r="20" fill="#4fffb0" opacity="0.9" filter="url(#glow_md)"/>
  <circle cx="640" cy="310" r="8" fill="white" opacity="0.9"/>
  <circle cx="640" cy="310" r="35" fill="none" stroke="#4fffb0" stroke-width="1" opacity="0.2" stroke-dasharray="4 8"/>
  <circle cx="640" cy="550" r="13" fill="#0d1a0a" stroke="rgba(79,255,176,0.4)" stroke-width="1.5"/>

  <!-- ===== CHAT UI ===== -->
  <rect x="80" y="640" width="640" height="210" rx="20" fill="rgba(10,10,10,0.7)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- User message -->
  <rect x="108" y="660" width="300" height="46" rx="12" fill="#141414" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <circle cx="128" cy="683" r="9" fill="#c8f247" opacity="0.9"/>
  <circle cx="128" cy="683" r="3.5" fill="#080a08"/>
  <rect x="145" y="675" width="130" height="7" rx="3.5" fill="rgba(240,236,228,0.22)"/>
  <rect x="145" y="688" width="90" height="6" rx="3" fill="rgba(240,236,228,0.11)"/>
  <!-- AI response -->
  <rect x="108" y="716" width="380" height="64" rx="12" fill="#111a0d" stroke="rgba(200,242,71,0.2)" stroke-width="1" filter="url(#glow_sm)"/>
  <circle cx="128" cy="742" r="9" fill="#c8f247" opacity="1"/>
  <circle cx="128" cy="742" r="2" fill="white"/>
  <rect x="145" y="730" width="200" height="7" rx="3.5" fill="rgba(200,242,71,0.45)"/>
  <rect x="145" y="743" width="165" height="6" rx="3" fill="rgba(200,242,71,0.28)"/>
  <rect x="145" y="755" width="120" height="6" rx="3" fill="rgba(200,242,71,0.15)"/>
  <!-- Typing dots -->
  <rect x="108" y="790" width="86" height="32" rx="10" fill="#111a0d" stroke="rgba(200,242,71,0.15)" stroke-width="1"/>
  <circle cx="130" cy="806" r="4.5" fill="#c8f247" opacity="0.9"/>
  <circle cx="147" cy="806" r="4.5" fill="#c8f247" opacity="0.55"/>
  <circle cx="164" cy="806" r="4.5" fill="#c8f247" opacity="0.25"/>
  <!-- Memory badge -->
  <rect x="520" y="790" width="160" height="32" rx="10" fill="rgba(200,242,71,0.07)" stroke="rgba(200,242,71,0.2)" stroke-width="1"/>
  <text x="600" y="811" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(200,242,71,0.6)" letter-spacing="1.5">MEMORY ON</text>

  <!-- ===== TAGS ===== -->
  <rect x="60" y="50" width="110" height="26" rx="7" fill="rgba(200,242,71,0.08)" stroke="rgba(200,242,71,0.28)" stroke-width="1"/>
  <text x="115" y="68" text-anchor="middle" font-family="monospace" font-size="11" fill="#c8f247" letter-spacing="1.5">LANGCHAIN</text>
  <rect x="184" y="50" width="80" height="26" rx="7" fill="rgba(79,255,176,0.07)" stroke="rgba(79,255,176,0.22)" stroke-width="1"/>
  <text x="224" y="68" text-anchor="middle" font-family="monospace" font-size="11" fill="#4fffb0" letter-spacing="1.5">LLAMA 3</text>

  <!-- Floating tokens -->
  <text x="520" y="175" font-family="monospace" font-size="11" fill="rgba(200,242,71,0.35)" letter-spacing="1">context.load()</text>
  <text x="520" y="620" font-family="monospace" font-size="11" fill="rgba(79,255,176,0.3)" letter-spacing="1">stream.generate()</text>
  <text x="60" y="175" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.12)" letter-spacing="1">input_tokens: 512</text>

  <!-- Ghost text -->
  <text x="400" y="880" text-anchor="middle" font-family="'Arial Black',sans-serif" font-weight="900" font-size="110" fill="rgba(200,242,71,0.03)" letter-spacing="-4">ANIX</text>

  <!-- Bottom bar -->
  <line x1="0" y1="870" x2="800" y2="870" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="60" y="890" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.2)" letter-spacing="2">PERSONAL AI ASSISTANT</text>
  <text x="740" y="890" text-anchor="end" font-family="monospace" font-size="10" fill="rgba(200,242,71,0.45)" letter-spacing="2">LIVE ↗</text>

  <!-- Corner marks -->
  <path d="M730,40 L760,40 L760,70" stroke="rgba(200,242,71,0.35)" stroke-width="1.5" fill="none"/>
  <path d="M70,860 L40,860 L40,830" stroke="rgba(200,242,71,0.35)" stroke-width="1.5" fill="none"/>

  <!-- Vertical label -->
  <g transform="translate(22,600) rotate(-90)">
    <text font-family="monospace" font-size="9" fill="rgba(255,255,255,0.1)" letter-spacing="3">CONVERSATIONAL AGENT · 2026</text>
  </g>
</svg>
