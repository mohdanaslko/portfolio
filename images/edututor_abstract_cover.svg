<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" width="960" height="540" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="eta_bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#090c14"/>
      <stop offset="100%" style="stop-color:#060708"/>
    </radialGradient>
    <radialGradient id="eta_blue" cx="42%" cy="55%" r="55%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="eta_lime" cx="72%" cy="30%" r="38%">
      <stop offset="0%" style="stop-color:#c8f247;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#c8f247;stop-opacity:0"/>
    </radialGradient>
    <filter id="eta_glow_sm">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eta_glow_md">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eta_blur_bg">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

