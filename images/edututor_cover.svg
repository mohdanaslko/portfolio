<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg" width="800" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="et_bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a0d14"/>
      <stop offset="100%" style="stop-color:#070809"/>
    </radialGradient>
    <radialGradient id="et_blue" cx="45%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.11"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="et_lime" cx="70%" cy="25%" r="40%">
      <stop offset="0%" style="stop-color:#c8f247;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#c8f247;stop-opacity:0"/>
    </radialGradient>
    <filter id="et_glow_sm">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="et_glow_md">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="et_glow_lg">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="et_blur_bg">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

