<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" width="960" height="540" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="mm_bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#080d0c"/>
      <stop offset="100%" style="stop-color:#060808"/>
    </radialGradient>
    <radialGradient id="mm_t" cx="50%" cy="38%" r="55%">
      <stop offset="0%" style="stop-color:#4fffb0;stop-opacity:0.11"/>
      <stop offset="100%" style="stop-color:#4fffb0;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="mm_l" cx="18%" cy="68%" r="38%">
      <stop offset="0%" style="stop-color:#c8f247;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#c8f247;stop-opacity:0"/>
    </radialGradient>
    <filter id="gsm">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gmd">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gxl">
      <feGaussianBlur stdDeviation="28" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bbg"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <rect width="960" height="540" fill="url(#mm_bg)"/>
  <rect width="960" height="540" fill="url(#mm_t)"/>
  <rect width="960" height="540" fill="url(#mm_l)"/>

  <!-- dot grid -->
  <g fill="rgba(255,255,255,0.028)">
    <circle cx="80" cy="90" r="1.4"/><circle cx="200" cy="90" r="1.4"/><circle cx="320" cy="90" r="1.4"/>
    <circle cx="440" cy="90" r="1.4"/><circle cx="560" cy="90" r="1.4"/><circle cx="680" cy="90" r="1.4"/>
    <circle cx="800" cy="90" r="1.4"/><circle cx="880" cy="90" r="1.4"/>
    <circle cx="80" cy="180" r="1.4"/><circle cx="200" cy="180" r="1.4"/><circle cx="320" cy="180" r="1.4"/>
    <circle cx="440" cy="180" r="1.4"/><circle cx="560" cy="180" r="1.4"/><circle cx="680" cy="180" r="1.4"/>
    <circle cx="800" cy="180" r="1.4"/><circle cx="880" cy="180" r="1.4"/>
    <circle cx="80" cy="270" r="1.4"/><circle cx="200" cy="270" r="1.4"/><circle cx="320" cy="270" r="1.4"/>
    <circle cx="440" cy="270" r="1.4"/><circle cx="560" cy="270" r="1.4"/><circle cx="680" cy="270" r="1.4"/>
    <circle cx="800" cy="270" r="1.4"/><circle cx="880" cy="270" r="1.4"/>
    <circle cx="80" cy="360" r="1.4"/><circle cx="200" cy="360" r="1.4"/><circle cx="320" cy="360" r="1.4"/>
    <circle cx="440" cy="360" r="1.4"/><circle cx="560" cy="360" r="1.4"/><circle cx="680" cy="360" r="1.4"/>
    <circle cx="800" cy="360" r="1.4"/><circle cx="880" cy="360" r="1.4"/>
    <circle cx="80" cy="450" r="1.4"/><circle cx="200" cy="450" r="1.4"/><circle cx="320" cy="450" r="1.4"/>
    <circle cx="440" cy="450" r="1.4"/><circle cx="560" cy="450" r="1.4"/><circle cx="680" cy="450" r="1.4"/>
    <circle cx="800" cy="450" r="1.4"/><circle cx="880" cy="450" r="1.4"/>
  </g>

  <!-- ===== MEDICAL CROSS LEFT ===== -->
  <circle cx="200" cy="270" r="130" fill="#4fffb0" opacity="0.04" filter="url(#bbg)"/>
  <rect x="178" y="160" width="44" height="220" rx="16" fill="#4fffb0" opacity="0.85" filter="url(#gmd)"/>
  <rect x="110" y="228" width="180" height="44" rx="16" fill="#4fffb0" opacity="0.85" filter="url(#gmd)"/>
  <rect x="188" y="170" width="24" height="200" rx="10" fill="white" opacity="0.1"/>
  <rect x="120" y="238" width="160" height="24" rx="10" fill="white" opacity="0.1"/>
  <!-- pulse rings -->
  <circle cx="200" cy="270" r="82" fill="none" stroke="#4fffb0" stroke-width="1.2" opacity="0.2" stroke-dasharray="5 9"/>
  <circle cx="200" cy="270" r="108" fill="none" stroke="#4fffb0" stroke-width="0.7" opacity="0.1"/>
  <circle cx="200" cy="270" r="140" fill="none" stroke="#4fffb0" stroke-width="0.4" opacity="0.05"/>

  <!-- ===== RAG PIPELINE (right 60%) - horizontal flow ===== -->
  <!-- spine -->
  <line x1="380" y1="270" x2="920" y2="270" stroke="rgba(79,255,176,0.14)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- arrows -->
  <polygon points="530,264 542,270 530,276" fill="rgba(79,255,176,0.38)"/>
  <polygon points="672,264 684,270 672,276" fill="rgba(79,255,176,0.32)"/>
  <polygon points="812,264 824,270 812,276" fill="rgba(79,255,176,0.28)"/>

  <!-- Stage 1: Query -->
  <rect x="360" y="200" width="160" height="140" rx="14" fill="#0b1210" stroke="rgba(200,242,71,0.26)" stroke-width="1.5"/>
  <text x="440" y="228" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(200,242,71,0.65)" letter-spacing="1.5">QUERY</text>
  <circle cx="394" cy="260" r="16" fill="rgba(200,242,71,0.09)" stroke="rgba(200,242,71,0.28)" stroke-width="1"/>
  <rect x="380" y="254" width="28" height="5" rx="2.5" fill="rgba(200,242,71,0.55)"/>
  <rect x="380" y="263" width="18" height="4" rx="2" fill="rgba(200,242,71,0.3)"/>
  <rect x="420" y="252" width="82" height="6" rx="3" fill="rgba(240,236,228,0.14)"/>
  <rect x="420" y="264" width="58" height="5" rx="2.5" fill="rgba(240,236,228,0.07)"/>
  <text x="440" y="318" text-anchor="middle" font-family="monospace" font-size="8.5" fill="rgba(200,242,71,0.3)" letter-spacing="1">user health question</text>

  <!-- Stage 2: Gemini -->
  <rect x="548" y="200" width="160" height="140" rx="14" fill="#0b1310" stroke="rgba(200,242,71,0.2)" stroke-width="1.5"/>
  <text x="628" y="228" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(200,242,71,0.65)" letter-spacing="1.5">GEMINI</text>
  <g>
    <rect x="566" y="242" width="38" height="5" rx="2.5" fill="rgba(200,242,71,0.62)"/>
    <rect x="610" y="242" width="26" height="5" rx="2.5" fill="rgba(200,242,71,0.43)"/>
    <rect x="642" y="242" width="46" height="5" rx="2.5" fill="rgba(200,242,71,0.7)"/>
    <rect x="566" y="253" width="30" height="5" rx="2.5" fill="rgba(79,255,176,0.5)"/>
    <rect x="602" y="253" width="44" height="5" rx="2.5" fill="rgba(79,255,176,0.38)"/>
    <rect x="652" y="253" width="28" height="5" rx="2.5" fill="rgba(200,242,71,0.45)"/>
    <rect x="566" y="264" width="50" height="5" rx="2.5" fill="rgba(200,242,71,0.55)"/>
    <rect x="622" y="264" width="34" height="5" rx="2.5" fill="rgba(79,255,176,0.3)"/>
  </g>
  <text x="628" y="318" text-anchor="middle" font-family="monospace" font-size="8.5" fill="rgba(200,242,71,0.28)" letter-spacing="1">vector embeddings</text>

  <!-- Stage 3: ChromaDB -->
  <rect x="696" y="200" width="160" height="140" rx="14" fill="#0a1110" stroke="rgba(79,255,176,0.28)" stroke-width="1.5" filter="url(#gsm)"/>
  <text x="776" y="228" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(79,255,176,0.65)" letter-spacing="1.5">CHROMADB</text>
  <!-- cylinder -->
  <ellipse cx="740" cy="262" rx="24" ry="7" fill="rgba(79,255,176,0.11)" stroke="rgba(79,255,176,0.32)" stroke-width="1"/>
  <rect x="716" y="262" width="48" height="22" fill="rgba(79,255,176,0.04)"/>
  <ellipse cx="740" cy="284" rx="24" ry="7" fill="rgba(79,255,176,0.11)" stroke="rgba(79,255,176,0.27)" stroke-width="1"/>
  <ellipse cx="740" cy="273" rx="24" ry="7" fill="none" stroke="rgba(79,255,176,0.14)" stroke-width="0.5" stroke-dasharray="2 4"/>
  <!-- doc icons -->
  <g fill="rgba(79,255,176,0.09)" stroke="rgba(79,255,176,0.28)" stroke-width="0.8">
    <rect x="782" y="250" width="12" height="16" rx="2"/>
    <rect x="798" y="250" width="12" height="16" rx="2"/>
    <rect x="814" y="250" width="12" height="16" rx="2"/>
    <rect x="830" y="250" width="12" height="16" rx="2"/>
  </g>
  <text x="776" y="318" text-anchor="middle" font-family="monospace" font-size="8.5" fill="rgba(79,255,176,0.28)" letter-spacing="1">trusted sources</text>

  <!-- ===== ACCURACY BADGE ===== -->
  <rect x="360" y="46" width="148" height="52" rx="12" fill="rgba(79,255,176,0.07)" stroke="rgba(79,255,176,0.24)" stroke-width="1"/>
  <text x="434" y="66" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(79,255,176,0.5)" letter-spacing="1">ACCURACY</text>
  <text x="434" y="88" text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="20" font-weight="900" fill="#4fffb0" letter-spacing="-0.5">98.6%</text>

  <!-- hallucination badge -->
  <rect x="524" y="56" width="148" height="32" rx="9" fill="rgba(200,242,71,0.07)" stroke="rgba(200,242,71,0.18)" stroke-width="1"/>
  <text x="598" y="77" text-anchor="middle" font-family="monospace" font-size="9.5" fill="rgba(200,242,71,0.5)" letter-spacing="1">↓ HALLUCINATIONS</text>

  <!-- ===== TAGS ===== -->
  <rect x="50" y="42" width="88" height="24" rx="6" fill="rgba(79,255,176,0.08)" stroke="rgba(79,255,176,0.24)" stroke-width="1"/>
  <text x="94" y="59" text-anchor="middle" font-family="monospace" font-size="10" fill="#4fffb0" letter-spacing="1.5">MEDICAL</text>
  <rect x="150" y="42" width="55" height="24" rx="6" fill="rgba(200,242,71,0.07)" stroke="rgba(200,242,71,0.2)" stroke-width="1"/>
  <text x="177" y="59" text-anchor="middle" font-family="monospace" font-size="10" fill="#c8f247" letter-spacing="1.5">RAG</text>

  <!-- ghost text -->
  <text x="480" y="510" text-anchor="middle" font-family="'Arial Black',sans-serif" font-weight="900" font-size="80" fill="rgba(79,255,176,0.025)" letter-spacing="-3">MEDIMIND</text>

  <!-- bottom bar -->
  <line x1="0" y1="516" x2="960" y2="516" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="50" y="532" font-family="monospace" font-size="9.5" fill="rgba(255,255,255,0.18)" letter-spacing="2">MEDIMINDAI — MEDICAL RAG SYSTEM</text>
  <text x="910" y="532" text-anchor="end" font-family="monospace" font-size="9.5" fill="rgba(79,255,176,0.42)" letter-spacing="2">LIVE ↗</text>

  <!-- corners -->
  <path d="M896,30 L926,30 L926,58" stroke="rgba(79,255,176,0.32)" stroke-width="1.5" fill="none"/>
  <path d="M64,510 L34,510 L34,482" stroke="rgba(79,255,176,0.32)" stroke-width="1.5" fill="none"/>

  <!-- vertical label -->
  <g transform="translate(20,380) rotate(-90)">
    <text font-family="monospace" font-size="8.5" fill="rgba(255,255,255,0.09)" letter-spacing="3">GEMINI · CHROMADB · LANGCHAIN</text>
  </g>
</svg>
