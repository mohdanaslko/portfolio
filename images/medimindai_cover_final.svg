<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg" width="800" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="mm_bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#080d0c"/>
      <stop offset="100%" style="stop-color:#060808"/>
    </radialGradient>
    <radialGradient id="mm_teal" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#4fffb0;stop-opacity:0.11"/>
      <stop offset="100%" style="stop-color:#4fffb0;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="mm_lime" cx="20%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#c8f247;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#c8f247;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow_sm">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow_md">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow_xl">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur_bg">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="800" height="900" fill="url(#mm_bg)"/>
  <rect width="800" height="900" fill="url(#mm_teal)"/>
  <rect width="800" height="900" fill="url(#mm_lime)"/>

  <!-- Dot grid -->
  <g fill="rgba(255,255,255,0.03)">
    <circle cx="80" cy="80" r="1.5"/><circle cx="160" cy="80" r="1.5"/><circle cx="240" cy="80" r="1.5"/>
    <circle cx="320" cy="80" r="1.5"/><circle cx="400" cy="80" r="1.5"/><circle cx="480" cy="80" r="1.5"/>
    <circle cx="560" cy="80" r="1.5"/><circle cx="640" cy="80" r="1.5"/><circle cx="720" cy="80" r="1.5"/>
    <circle cx="80" cy="160" r="1.5"/><circle cx="160" cy="160" r="1.5"/><circle cx="240" cy="160" r="1.5"/>
    <circle cx="320" cy="160" r="1.5"/><circle cx="400" cy="160" r="1.5"/><circle cx="480" cy="160" r="1.5"/>
    <circle cx="560" cy="160" r="1.5"/><circle cx="640" cy="160" r="1.5"/><circle cx="720" cy="160" r="1.5"/>
    <circle cx="80" cy="240" r="1.5"/><circle cx="160" cy="240" r="1.5"/><circle cx="240" cy="240" r="1.5"/>
    <circle cx="320" cy="240" r="1.5"/><circle cx="400" cy="240" r="1.5"/><circle cx="480" cy="240" r="1.5"/>
    <circle cx="560" cy="240" r="1.5"/><circle cx="640" cy="240" r="1.5"/><circle cx="720" cy="240" r="1.5"/>
    <circle cx="80" cy="320" r="1.5"/><circle cx="160" cy="320" r="1.5"/><circle cx="240" cy="320" r="1.5"/>
    <circle cx="320" cy="320" r="1.5"/><circle cx="400" cy="320" r="1.5"/><circle cx="480" cy="320" r="1.5"/>
    <circle cx="560" cy="320" r="1.5"/><circle cx="640" cy="320" r="1.5"/><circle cx="720" cy="320" r="1.5"/>
    <circle cx="80" cy="400" r="1.5"/><circle cx="160" cy="400" r="1.5"/><circle cx="240" cy="400" r="1.5"/>
    <circle cx="320" cy="400" r="1.5"/><circle cx="400" cy="400" r="1.5"/><circle cx="480" cy="400" r="1.5"/>
    <circle cx="560" cy="400" r="1.5"/><circle cx="640" cy="400" r="1.5"/><circle cx="720" cy="400" r="1.5"/>
    <circle cx="80" cy="480" r="1.5"/><circle cx="160" cy="480" r="1.5"/><circle cx="240" cy="480" r="1.5"/>
    <circle cx="320" cy="480" r="1.5"/><circle cx="400" cy="480" r="1.5"/><circle cx="480" cy="480" r="1.5"/>
    <circle cx="560" cy="480" r="1.5"/><circle cx="640" cy="480" r="1.5"/><circle cx="720" cy="480" r="1.5"/>
    <circle cx="80" cy="560" r="1.5"/><circle cx="160" cy="560" r="1.5"/><circle cx="240" cy="560" r="1.5"/>
    <circle cx="320" cy="560" r="1.5"/><circle cx="400" cy="560" r="1.5"/><circle cx="480" cy="560" r="1.5"/>
    <circle cx="560" cy="560" r="1.5"/><circle cx="640" cy="560" r="1.5"/><circle cx="720" cy="560" r="1.5"/>
    <circle cx="80" cy="640" r="1.5"/><circle cx="160" cy="640" r="1.5"/><circle cx="240" cy="640" r="1.5"/>
    <circle cx="320" cy="640" r="1.5"/><circle cx="400" cy="640" r="1.5"/><circle cx="480" cy="640" r="1.5"/>
    <circle cx="560" cy="640" r="1.5"/><circle cx="640" cy="640" r="1.5"/><circle cx="720" cy="640" r="1.5"/>
    <circle cx="80" cy="720" r="1.5"/><circle cx="160" cy="720" r="1.5"/><circle cx="240" cy="720" r="1.5"/>
    <circle cx="320" cy="720" r="1.5"/><circle cx="400" cy="720" r="1.5"/><circle cx="480" cy="720" r="1.5"/>
    <circle cx="560" cy="720" r="1.5"/><circle cx="640" cy="720" r="1.5"/><circle cx="720" cy="720" r="1.5"/>
    <circle cx="80" cy="800" r="1.5"/><circle cx="160" cy="800" r="1.5"/><circle cx="240" cy="800" r="1.5"/>
    <circle cx="320" cy="800" r="1.5"/><circle cx="400" cy="800" r="1.5"/><circle cx="480" cy="800" r="1.5"/>
    <circle cx="560" cy="800" r="1.5"/><circle cx="640" cy="800" r="1.5"/><circle cx="720" cy="800" r="1.5"/>
  </g>

  <!-- ===== LARGE MEDICAL CROSS — CENTER TOP ===== -->
  <!-- Ambient glow -->
  <circle cx="400" cy="200" r="140" fill="#4fffb0" opacity="0.05" filter="url(#blur_bg)"/>
  <!-- Cross arms -->
  <rect x="373" y="90" width="54" height="220" rx="18" fill="#4fffb0" opacity="0.88" filter="url(#glow_md)"/>
  <rect x="290" y="173" width="220" height="54" rx="18" fill="#4fffb0" opacity="0.88" filter="url(#glow_md)"/>
  <!-- Inner shine -->
  <rect x="385" y="102" width="30" height="196" rx="12" fill="white" opacity="0.12"/>
  <rect x="302" y="185" width="196" height="30" rx="12" fill="white" opacity="0.12"/>
  <!-- Pulse rings -->
  <circle cx="400" cy="200" r="95" fill="none" stroke="#4fffb0" stroke-width="1.2" opacity="0.22" stroke-dasharray="5 9"/>
  <circle cx="400" cy="200" r="125" fill="none" stroke="#4fffb0" stroke-width="0.8" opacity="0.1"/>
  <circle cx="400" cy="200" r="160" fill="none" stroke="#4fffb0" stroke-width="0.5" opacity="0.05"/>

  <!-- ===== RAG PIPELINE — VERTICAL FLOW ===== -->
  <!-- Central spine -->
  <line x1="400" y1="360" x2="400" y2="760" stroke="rgba(79,255,176,0.15)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Flow arrows -->
  <polygon points="394,440 400,455 406,440" fill="rgba(79,255,176,0.4)"/>
  <polygon points="394,550 400,565 406,550" fill="rgba(79,255,176,0.35)"/>
  <polygon points="394,660 400,675 406,660" fill="rgba(79,255,176,0.3)"/>

  <!-- Stage 1: Query -->
  <rect x="240" y="360" width="320" height="72" rx="14" fill="#0b1210" stroke="rgba(200,242,71,0.28)" stroke-width="1.5"/>
  <circle cx="276" cy="396" r="18" fill="rgba(200,242,71,0.1)" stroke="rgba(200,242,71,0.3)" stroke-width="1"/>
  <rect x="262" y="390" width="28" height="5" rx="2.5" fill="rgba(200,242,71,0.6)"/>
  <rect x="262" y="399" width="18" height="4" rx="2" fill="rgba(200,242,71,0.35)"/>
  <text x="560" y="390" text-anchor="end" font-family="monospace" font-size="11" fill="rgba(200,242,71,0.7)" letter-spacing="1">QUERY</text>
  <rect x="305" y="382" width="180" height="7" rx="3.5" fill="rgba(240,236,228,0.15)"/>
  <rect x="305" y="395" width="130" height="6" rx="3" fill="rgba(240,236,228,0.08)"/>
  <text x="305" y="420" font-family="monospace" font-size="9" fill="rgba(200,242,71,0.35)" letter-spacing="1">user health question</text>

  <!-- Stage 2: Gemini Embeddings -->
  <rect x="200" y="462" width="400" height="80" rx="14" fill="#0b1310" stroke="rgba(200,242,71,0.22)" stroke-width="1.5"/>
  <text x="400" y="488" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(200,242,71,0.7)" letter-spacing="1.5">GEMINI EMBEDDINGS</text>
  <!-- Vector bars -->
  <g>
    <rect x="225" y="497" width="42" height="6" rx="3" fill="rgba(200,242,71,0.65)"/>
    <rect x="273" y="497" width="28" height="6" rx="3" fill="rgba(200,242,71,0.45)"/>
    <rect x="307" y="497" width="50" height="6" rx="3" fill="rgba(200,242,71,0.75)"/>
    <rect x="363" y="497" width="22" height="6" rx="3" fill="rgba(200,242,71,0.38)"/>
    <rect x="391" y="497" width="38" height="6" rx="3" fill="rgba(79,255,176,0.55)"/>
    <rect x="435" y="497" width="46" height="6" rx="3" fill="rgba(79,255,176,0.42)"/>
    <rect x="487" y="497" width="32" height="6" rx="3" fill="rgba(200,242,71,0.5)"/>
    <rect x="525" y="497" width="55" height="6" rx="3" fill="rgba(79,255,176,0.35)"/>
  </g>
  <text x="400" y="530" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.2)" letter-spacing="1">semantic vector search</text>

  <!-- Stage 3: ChromaDB -->
  <rect x="200" y="572" width="400" height="80" rx="14" fill="#0a1110" stroke="rgba(79,255,176,0.3)" stroke-width="1.5" filter="url(#glow_sm)"/>
  <text x="400" y="598" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(79,255,176,0.7)" letter-spacing="1.5">CHROMADB</text>
  <!-- Cylinder mini -->
  <ellipse cx="240" cy="612" rx="22" ry="6" fill="rgba(79,255,176,0.12)" stroke="rgba(79,255,176,0.35)" stroke-width="1"/>
  <rect x="218" y="612" width="44" height="20" fill="rgba(79,255,176,0.05)"/>
  <ellipse cx="240" cy="632" rx="22" ry="6" fill="rgba(79,255,176,0.12)" stroke="rgba(79,255,176,0.3)" stroke-width="1"/>
  <ellipse cx="240" cy="622" rx="22" ry="6" fill="none" stroke="rgba(79,255,176,0.15)" stroke-width="0.5" stroke-dasharray="2 4"/>
  <text x="400" y="628" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.2)" letter-spacing="1">medical vector corpus</text>
  <!-- Doc icons -->
  <g fill="rgba(79,255,176,0.1)" stroke="rgba(79,255,176,0.3)" stroke-width="0.8">
    <rect x="490" y="605" width="14" height="18" rx="2"/>
    <rect x="510" y="605" width="14" height="18" rx="2"/>
    <rect x="530" y="605" width="14" height="18" rx="2"/>
    <rect x="550" y="605" width="14" height="18" rx="2"/>
  </g>
  <text x="520" y="640" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(79,255,176,0.3)" letter-spacing="0.5">trusted sources</text>

  <!-- Stage 4: Grounded Answer -->
  <rect x="180" y="682" width="440" height="80" rx="14" fill="#0a1410" stroke="rgba(79,255,176,0.35)" stroke-width="1.5" filter="url(#glow_sm)"/>
  <!-- Verified icon -->
  <circle cx="220" cy="722" r="16" fill="rgba(79,255,176,0.12)" stroke="rgba(79,255,176,0.45)" stroke-width="1.5"/>
  <text x="220" y="728" text-anchor="middle" font-size="14" fill="#4fffb0" font-weight="bold">✓</text>
  <text x="430" y="708" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(79,255,176,0.8)" letter-spacing="1.5">GROUNDED ANSWER</text>
  <rect x="248" y="714" width="200" height="7" rx="3.5" fill="rgba(79,255,176,0.5)"/>
  <rect x="248" y="727" width="160" height="6" rx="3" fill="rgba(79,255,176,0.3)"/>
  <rect x="248" y="739" width="130" height="6" rx="3" fill="rgba(79,255,176,0.18)"/>
  <!-- Hallucination badge -->
  <rect x="480" y="714" width="120" height="22" rx="6" fill="rgba(200,242,71,0.08)" stroke="rgba(200,242,71,0.2)" stroke-width="0.8"/>
  <text x="540" y="729" text-anchor="middle" font-family="monospace" font-size="8.5" fill="rgba(200,242,71,0.55)" letter-spacing="0.5">↓ HALLUCINATIONS</text>

  <!-- ===== TAGS ===== -->
  <rect x="60" y="50" width="90" height="26" rx="7" fill="rgba(79,255,176,0.08)" stroke="rgba(79,255,176,0.25)" stroke-width="1"/>
  <text x="105" y="68" text-anchor="middle" font-family="monospace" font-size="11" fill="#4fffb0" letter-spacing="1.5">MEDICAL</text>
  <rect x="164" y="50" width="55" height="26" rx="7" fill="rgba(200,242,71,0.07)" stroke="rgba(200,242,71,0.2)" stroke-width="1"/>
  <text x="191" y="68" text-anchor="middle" font-family="monospace" font-size="11" fill="#c8f247" letter-spacing="1.5">RAG</text>

  <!-- Accuracy badge top right -->
  <rect x="580" y="42" width="160" height="52" rx="12" fill="rgba(79,255,176,0.07)" stroke="rgba(79,255,176,0.25)" stroke-width="1"/>
  <text x="660" y="62" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(79,255,176,0.5)" letter-spacing="1">ACCURACY</text>
  <text x="660" y="84" text-anchor="middle" font-family="'Arial Black',sans-serif" font-size="20" font-weight="900" fill="#4fffb0" letter-spacing="-0.5">98.6%</text>

  <!-- Ghost watermark -->
  <text x="400" y="875" text-anchor="middle" font-family="'Arial Black',sans-serif" font-weight="900" font-size="90" fill="rgba(79,255,176,0.025)" letter-spacing="-3">MEDIMIND</text>

  <!-- Bottom bar -->
  <line x1="0" y1="870" x2="800" y2="870" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="60" y="890" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.2)" letter-spacing="2">MEDIMINDAI — MEDICAL RAG</text>
  <text x="740" y="890" text-anchor="end" font-family="monospace" font-size="10" fill="rgba(79,255,176,0.45)" letter-spacing="2">LIVE ↗</text>

  <!-- Corner marks -->
  <path d="M730,40 L760,40 L760,70" stroke="rgba(79,255,176,0.35)" stroke-width="1.5" fill="none"/>
  <path d="M70,860 L40,860 L40,830" stroke="rgba(79,255,176,0.35)" stroke-width="1.5" fill="none"/>

  <!-- Vertical label -->
  <g transform="translate(22,600) rotate(-90)">
    <text font-family="monospace" font-size="9" fill="rgba(255,255,255,0.1)" letter-spacing="3">GEMINI · CHROMADB · LANGCHAIN</text>
  </g>
</svg>
